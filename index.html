<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>OrderFlow</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:'Syne','Helvetica Neue',sans-serif;background:#080808;color:#EDEDED;min-height:100vh;max-width:480px;margin:0 auto;}
  ::-webkit-scrollbar{width:0;height:0;}
  input,textarea,select{outline:none;font-family:inherit;}
  button{font-family:inherit;cursor:pointer;}

  /* Animations */
  .fade-in{animation:fadeUp 0.3s cubic-bezier(0.16,1,0.3,1) both;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:none;}}
  .sheet-up{animation:sheetUp 0.38s cubic-bezier(0.16,1,0.3,1) both;}
  @keyframes sheetUp{from{transform:translateY(100%);opacity:0;}to{transform:none;opacity:1;}}
  .toast-in{animation:toastAnim 0.3s cubic-bezier(0.16,1,0.3,1) both;}
  @keyframes toastAnim{from{opacity:0;transform:translateX(-50%) translateY(14px) scale(0.92);}to{opacity:1;transform:translateX(-50%) translateY(0) scale(1);}}

  /* Reusable */
  .press{transition:transform 0.12s cubic-bezier(0.34,1.56,0.64,1),opacity 0.12s;}
  .press:active{transform:scale(0.94);opacity:0.8;}
  .card{background:#111;border:1px solid rgba(255,255,255,0.06);border-radius:20px;}
  .glow-sep{height:1px;background:linear-gradient(90deg,transparent,rgba(201,168,76,0.3),transparent);margin:20px 0;}
  .status-pill{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:100px;font-size:11px;font-weight:600;}
  .chip{display:inline-flex;align-items:center;padding:7px 14px;border-radius:100px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;border:1px solid;transition:all 0.18s;}

  /* Inputs */
  .lux-input{width:100%;padding:14px 16px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:14px;color:#EDEDED;font-size:14px;font-family:inherit;transition:border-color 0.2s;}
  .lux-input:focus{border-color:rgba(201,168,76,0.45);background:rgba(255,255,255,0.055);}
  .lux-input::placeholder{color:#383838;}
  .lux-label{font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:#444;display:block;margin-bottom:7px;}

  /* Buttons */
  .gold-btn{width:100%;padding:15px;border-radius:14px;border:none;background:linear-gradient(135deg,#C9A84C,#E8C97A);color:#0a0a0a;font-weight:800;font-size:15px;font-family:inherit;letter-spacing:0.02em;transition:all 0.2s;}
  .gold-btn:disabled{background:#1e1e1e;color:#333;cursor:not-allowed;}
  .gold-btn:active:not(:disabled){transform:scale(0.97);}
  .ghost-btn{padding:13px 18px;border-radius:14px;border:1px solid rgba(255,255,255,0.08);background:transparent;color:#555;font-weight:600;font-size:14px;font-family:inherit;}
  .ghost-btn:active{background:rgba(255,255,255,0.04);}
  .danger-btn{padding:13px 18px;border-radius:14px;border:none;background:rgba(255,92,92,0.1);color:#FF5C5C;font-weight:600;font-size:14px;font-family:inherit;}
  .wa-btn{width:100%;padding:12px;border-radius:14px;border:1px solid rgba(37,211,102,0.2);background:rgba(37,211,102,0.07);color:#25D366;font-weight:600;font-size:14px;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:9px;}
  .wa-btn:active{transform:scale(0.97);background:rgba(37,211,102,0.13);}

  /* Header */
  .app-header{padding:18px 20px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;background:rgba(8,8,8,0.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,0.05);}
  .logo-box{width:38px;height:38px;border-radius:11px;background:linear-gradient(135deg,#C9A84C,#E8C97A);display:flex;align-items:center;justify-content:center;}

  /* Bottom Nav */
  .bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;display:flex;z-index:100;background:rgba(8,8,8,0.94);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-top:1px solid rgba(255,255,255,0.05);}
  .nav-btn{flex:1;padding:14px 0 12px;background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:4px;position:relative;}
  .nav-label{font-size:10px;letter-spacing:0.06em;text-transform:uppercase;font-weight:400;color:#444;}
  .nav-label.active{color:#00E5A0;font-weight:700;}
  .nav-indicator{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:18px;height:2px;background:#00E5A0;border-radius:2px;}
  .nav-badge{position:absolute;top:10px;right:50%;transform:translateX(10px);background:#F5A623;color:#0a0a0a;border-radius:20px;font-size:9px;font-weight:800;padding:2px 5px;min-width:16px;text-align:center;}

  /* Sheet modal */
  .sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:200;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);}
  .sheet-box{background:#0e0e0e;border-radius:24px 24px 0 0;padding:0 20px 44px;width:100%;max-width:480px;max-height:92vh;overflow-y:auto;border:1px solid rgba(255,255,255,0.06);border-bottom:none;}
  .sheet-handle{text-align:center;padding-top:12px;padding-bottom:6px;}
  .sheet-handle-bar{width:32px;height:4px;background:rgba(255,255,255,0.08);border-radius:4px;display:inline-block;}
  .sheet-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px;padding-top:6px;}
  .sheet-title{font-weight:800;font-size:20px;letter-spacing:-0.03em;}
  .close-btn{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-radius:50%;width:34px;height:34px;display:flex;align-items:center;justify-content:center;}

  /* Auth screen */
  .auth-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;}
  .auth-logo{width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,#C9A84C,#E8C97A);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;}
  .auth-title{font-weight:800;font-size:28px;letter-spacing:-0.04em;text-align:center;margin-bottom:6px;}
  .auth-sub{color:#444;font-size:14px;text-align:center;margin-bottom:36px;line-height:1.6;}
  .auth-form{width:100%;}
  .auth-switch{text-align:center;margin-top:20px;color:#444;font-size:13px;}
  .auth-switch span{color:#C9A84C;font-weight:700;cursor:pointer;}

  /* Page content */
  .page{padding:20px 16px 100px;}
  .page-title{font-weight:800;font-size:24px;letter-spacing:-0.04em;margin-bottom:4px;}
  .page-sub{font-size:12px;color:#383838;margin-bottom:20px;}

  /* Stat cards */
  .stat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:20px;}
  .stat-card{background:#0e0e0e;border:1px solid rgba(255,255,255,0.05);border-radius:16px;padding:14px 12px;}
  .stat-value{font-size:21px;font-weight:800;letter-spacing:-0.04em;line-height:1;}
  .stat-label{font-size:11px;font-weight:600;color:#ABABAB;margin-top:6px;letter-spacing:0.02em;}
  .stat-sub{font-size:10px;color:#383838;margin-top:2px;}

  /* Order card */
  .order-card{background:#111;border:1px solid rgba(255,255,255,0.06);border-radius:20px;padding:16px;margin-bottom:10px;cursor:pointer;}
  .order-card:active{border-color:rgba(201,168,76,0.18);}
  .order-avatar{width:40px;height:40px;border-radius:13px;background:rgba(201,168,76,0.08);border:1px solid rgba(201,168,76,0.12);display:flex;align-items:center;justify-content:center;color:#C9A84C;font-weight:800;font-size:16px;flex-shrink:0;}
  .order-name{font-weight:700;font-size:14px;color:#EDEDED;letter-spacing:-0.01em;}
  .order-phone{color:#383838;font-size:11px;margin-top:2px;font-family:'JetBrains Mono',monospace;}
  .order-amount{font-weight:800;font-size:16px;color:#C9A84C;letter-spacing:-0.03em;}
  .order-items{font-size:12px;color:#444;margin-bottom:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-left:50px;}
  .order-date{margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,0.04);font-size:10px;color:#2a2a2a;font-family:'JetBrains Mono',monospace;letter-spacing:0.04em;}
  .status-row{display:flex;gap:6px;overflow-x:auto;}
  .status-chip{flex-shrink:0;padding:5px 11px;border-radius:100px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid;font-family:inherit;}

  /* Customer card */
  .customer-card{background:#111;border:1px solid rgba(255,255,255,0.06);border-radius:20px;padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;gap:12px;cursor:pointer;}
  .customer-card:active{border-color:rgba(201,168,76,0.18);}
  .customer-avatar{width:44px;height:44px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:18px;flex-shrink:0;position:relative;}

  /* Template card */
  .template-card{background:#111;border:1px solid rgba(255,255,255,0.06);border-radius:20px;padding:16px;margin-bottom:12px;}

  /* Empty state */
  .empty{text-align:center;padding:60px 20px;}
  .empty-icon{display:flex;justify-content:center;margin-bottom:14px;opacity:0.35;}
  .empty-title{font-weight:700;font-size:15px;color:#444;margin-bottom:6px;}
  .empty-sub{color:#2e2e2e;font-size:13px;line-height:1.65;}

  /* Toast */
  .toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:100px;font-weight:600;font-size:13px;z-index:9999;white-space:nowrap;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);letter-spacing:0.02em;}

  /* Loading */
  .loading{display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:16px;}
  .spinner{width:32px;height:32px;border:2px solid rgba(201,168,76,0.2);border-top-color:#C9A84C;border-radius:50%;animation:spin 0.8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}

  .filter-row{display:flex;gap:7px;overflow-x:auto;padding-bottom:4px;margin-bottom:18px;}
  .search-wrap{position:relative;margin-bottom:14px;}
  .search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);pointer-events:none;}
  .search-input{padding-left:40px;}

  .detail-row{display:flex;gap:16px;margin-bottom:10px;align-items:flex-start;}
  .detail-label{font-size:10px;letter-spacing:0.07em;text-transform:uppercase;font-weight:600;color:#2e2e2e;min-width:60px;padding-top:2px;}
  .detail-value{font-size:13px;color:#999;flex:1;line-height:1.55;}

  .section-label{font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:#2e2e2e;font-weight:600;margin-bottom:10px;}

  .status-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:18px;}
  .status-update-btn{padding:11px;border-radius:12px;border:1px solid;font-weight:700;font-size:13px;cursor:pointer;font-family:inherit;}

  .method-card{width:100%;background:#0e0e0e;border:1px solid rgba(255,255,255,0.07);border-radius:18px;padding:16px;margin-bottom:10px;display:flex;align-items:center;gap:14px;cursor:pointer;text-align:left;}
  .method-card:active{border-color:rgba(201,168,76,0.25);background:rgba(201,168,76,0.04);}
  .method-icon{width:42px;height:42px;border-radius:13px;background:rgba(201,168,76,0.08);border:1px solid rgba(201,168,76,0.15);display:flex;align-items:center;justify-content:center;font-size:20px;color:#C9A84C;flex-shrink:0;}

  .profile-avatar{width:72px;height:72px;border-radius:22px;background:rgba(201,168,76,0.1);border:1px solid rgba(201,168,76,0.2);display:flex;align-items:center;justify-content:center;color:#C9A84C;font-weight:900;font-size:28px;margin:0 auto 12px;}
  .profile-name{font-weight:800;font-size:20px;letter-spacing:-0.03em;text-align:center;}
  .profile-phone{color:#383838;font-size:13px;margin-top:4px;font-family:'JetBrains Mono',monospace;text-align:center;}

  .stats-2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:22px;}
  .mini-stat{background:#0e0e0e;border:1px solid rgba(255,255,255,0.05);border-radius:14px;padding:16px;text-align:center;}
  .mini-stat-value{font-weight:800;font-size:24px;letter-spacing:-0.04em;}
  .mini-stat-label{color:#383838;font-size:10px;margin-top:5px;letter-spacing:0.07em;text-transform:uppercase;font-weight:600;}

  .settings-plan{background:linear-gradient(135deg,rgba(201,168,76,0.08),rgba(201,168,76,0.02));border:1px solid rgba(201,168,76,0.15);border-radius:20px;padding:20px;margin-bottom:14px;}
  .plan-badge{background:rgba(201,168,76,0.15);border:1px solid rgba(201,168,76,0.3);border-radius:8px;padding:4px 10px;font-size:11px;font-weight:700;color:#C9A84C;letter-spacing:0.06em;}
  .feature-row{display:flex;align-items:center;gap:9px;margin-bottom:8px;font-size:13px;}

  .logout-btn{width:100%;padding:14px;border-radius:14px;border:1px solid rgba(255,92,92,0.2);background:rgba(255,92,92,0.05);color:#FF5C5C;font-weight:700;font-size:14px;font-family:inherit;margin-top:14px;}
</style>
</head>
<body>

<div id="app">
  <div class="loading">
    <div class="spinner"></div>
    <div style="color:#444;font-size:13px;letter-spacing:0.05em;">Loading OrderFlow…</div>
  </div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

// ─── YOUR SUPABASE KEYS ───────────────────────────────
const SUPABASE_URL = 'https://kxkiysmbwltvztrswegg.supabase.co';
const SUPABASE_KEY = 'sb_publishable_K-2LRPW1MLw3po4jxSthcg_g_vcoGYs';
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);
// ─────────────────────────────────────────────────────

// ─── STATE ───────────────────────────────────────────
let state = {
  user: null,
  tab: 'orders',
  orders: [],
  customers: [],
  templates: [],
  loading: true,
  modal: null,
  selected: null,
  searchQ: '',
  filter: 'All',
  authMode: 'login',
  orderStep: 'method',
  chatText: '',
  orderForm: { customer_name:'', phone:'', items:'', total:'', address:'', notes:'' },
  templateForm: { title:'', body:'' },
  parsing: false,
};

const STATUSES = ['Pending','Paid','Processing','Delivered','Cancelled'];
const STATUS_CONFIG = {
  Pending:    { color:'#F5A623', bg:'rgba(245,166,35,0.12)', dot:'#F5A623' },
  Paid:       { color:'#4FACFE', bg:'rgba(79,172,254,0.12)', dot:'#4FACFE' },
  Processing: { color:'#A78BFA', bg:'rgba(167,139,250,0.12)', dot:'#A78BFA' },
  Delivered:  { color:'#00E5A0', bg:'rgba(0,229,160,0.12)', dot:'#00E5A0' },
  Cancelled:  { color:'#FF5C5C', bg:'rgba(255,92,92,0.12)', dot:'#FF5C5C' },
};

const DEFAULT_TEMPLATES = [
  { title:'Order Received', body:'Hi {name}! Your order has been received and is being processed. We will update you shortly. Thank you!' },
  { title:'Payment Confirmed', body:'Hi {name}! We have confirmed your payment of {amount}. Your order is being prepared and will be on its way soon.' },
  { title:'Out for Delivery', body:'Hi {name}! Your order is now out for delivery. Please ensure someone is available to receive it. Thank you!' },
  { title:'Order Delivered', body:'Hi {name}! Your order has been delivered successfully. We hope you love it! Reach out anytime if you need help.' },
];

const fmt = (n) => `₦${Number(n||0).toLocaleString()}`;
const today = () => new Date().toISOString().split('T')[0];
const uid = () => Math.random().toString(36).slice(2,10);

// ─── TOAST ───────────────────────────────────────────
let toastTimer;
function showToast(msg, type='success') {
  let t = document.getElementById('toast');
  if(!t){ t=document.createElement('div'); t.id='toast'; t.className='toast toast-in'; document.body.appendChild(t); }
  t.textContent = (type==='success'?'✓  ':'✕  ') + msg;
  t.style.background = type==='error' ? 'rgba(255,92,92,0.12)' : 'rgba(0,229,160,0.08)';
  t.style.border = type==='error' ? '1px solid rgba(255,92,92,0.25)' : '1px solid rgba(0,229,160,0.2)';
  t.style.color = type==='error' ? '#FF5C5C' : '#00E5A0';
  t.style.display='block';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>{ t.style.display='none'; }, 3000);
}

// ─── CHAT PARSER ─────────────────────────────────────
function parseChat(text) {
  const result = { name:'', phone:'', items:'', address:'', total:'' };
  const lines = text.split('\n').map(l=>l.trim()).filter(Boolean);
  lines.forEach(line => {
    const lower = line.toLowerCase();
    if(!result.name && (lower.includes('name')||lower.includes('customer')))
      result.name = line.replace(/.*?[:–-]\s*/i,'').trim();
    const phoneMatch = line.match(/(\+?234|0)[789]\d{9}/);
    if(phoneMatch) result.phone = phoneMatch[0];
    if(lower.includes('address')||lower.includes('deliver')||lower.includes('location'))
      result.address = line.replace(/.*?[:–-]\s*/i,'').trim();
    const moneyMatch = line.match(/[₦#]?\s?(\d[\d,]*)/);
    if(moneyMatch && (lower.includes('total')||lower.includes('amount')||lower.includes('pay')||lower.includes('₦')))
      result.total = moneyMatch[1].replace(/,/g,'');
    if(lower.includes('order')||lower.includes('item')||lower.includes('want')||lower.match(/\d+\s*(pcs|units|bags|box)/i))
      if(!result.items) result.items = line.replace(/.*?[:–-]\s*/i,'').trim();
  });
  if(!result.items) result.items = lines.slice(0,3).join(', ');
  return result;
}

// ─── SUPABASE FUNCTIONS ───────────────────────────────
async function loadData() {
  const [ordersRes, customersRes, templatesRes] = await Promise.all([
    sb.from('orders').select('*').order('created_at', {ascending:false}),
    sb.from('customers').select('*').order('total_spent', {ascending:false}),
    sb.from('templates').select('*').order('created_at'),
  ]);
  state.orders = ordersRes.data || [];
  state.customers = customersRes.data || [];
  state.templates = templatesRes.data || [];

  // Add default templates if none exist
  if(state.templates.length === 0) {
    for(const t of DEFAULT_TEMPLATES) {
      await sb.from('templates').insert({ ...t, user_id: state.user.id });
    }
    const res = await sb.from('templates').select('*').order('created_at');
    state.templates = res.data || [];
  }
}

async function addOrder(data) {
  const { data: order, error } = await sb.from('orders').insert({
    ...data, user_id: state.user.id, status: 'Pending'
  }).select().single();
  if(error){ showToast('Error saving order','error'); return; }
  state.orders.unshift(order);
  await upsertCustomer(data.customer_name, data.phone, data.total);
  showToast('Order created');
  state.modal = null;
  render();
}

async function upsertCustomer(name, phone, amount) {
  const existing = state.customers.find(c => c.phone === phone);
  if(existing) {
    const newTotal = (existing.total_spent||0) + Number(amount||0);
    const newCount = (existing.order_count||0) + 1;
    await sb.from('customers').update({ total_spent:newTotal, order_count:newCount }).eq('id', existing.id);
    existing.total_spent = newTotal;
    existing.order_count = newCount;
  } else {
    const { data } = await sb.from('customers').insert({
      name, phone, total_spent: Number(amount||0), order_count:1, user_id: state.user.id
    }).select().single();
    if(data) state.customers.unshift(data);
  }
}

async function updateStatus(id, status) {
  await sb.from('orders').update({ status }).eq('id', id);
  const o = state.orders.find(o=>o.id===id);
  if(o) o.status = status;
  showToast('Status updated to ' + status);
  render();
}

async function deleteOrder(id) {
  await sb.from('orders').delete().eq('id', id);
  state.orders = state.orders.filter(o=>o.id!==id);
  state.modal = null;
  showToast('Order removed','error');
  render();
}

async function saveTemplate(data) {
  if(state.selected && state.selected.id) {
    await sb.from('templates').update({ title:data.title, body:data.body }).eq('id', state.selected.id);
    const t = state.templates.find(t=>t.id===state.selected.id);
    if(t){ t.title=data.title; t.body=data.body; }
  } else {
    const { data: tmpl } = await sb.from('templates').insert({ ...data, user_id:state.user.id }).select().single();
    if(tmpl) state.templates.push(tmpl);
  }
  showToast('Template saved');
  state.modal = null;
  state.selected = null;
  render();
}

async function deleteTemplate(id) {
  await sb.from('templates').delete().eq('id', id);
  state.templates = state.templates.filter(t=>t.id!==id);
  showToast('Template deleted','error');
  render();
}

// ─── AUTH ─────────────────────────────────────────────
async function signUp(email, password, businessName) {
  const { data, error } = await sb.auth.signUp({ email, password });
  if(error){ showToast(error.message,'error'); return; }
  if(data.user) {
    await sb.from('profiles').insert({ id:data.user.id, business_name:businessName });
    showToast('Account created! Check your email to confirm.');
  }
}

async function signIn(email, password) {
  const { error } = await sb.auth.signInWithPassword({ email, password });
  if(error){ showToast(error.message,'error'); }
}

async function signOut() {
  await sb.auth.signOut();
  state.user = null;
  state.orders = []; state.customers = []; state.templates = [];
  render();
}

function renderOrders() {
  const todayOrders = state.orders.filter(o => o.created_at?.startsWith(today()));
  const todayRevenue = todayOrders.filter(o=>o.status!=='Cancelled').reduce((s,o)=>s+Number(o.total||0),0);
  const pendingCount = state.orders.filter(o=>o.status==='Pending').length;
  const totalRevenue = state.orders.filter(o=>o.status==='Delivered').reduce((s,o)=>s+Number(o.total||0),0);

  const filtered = state.orders.filter(o => {
    const matchFilter = state.filter === 'All' || o.status === state.filter;
    const q = state.searchQ.toLowerCase();
    const matchSearch = !q || o.customer_name?.toLowerCase().includes(q) || o.phone?.includes(q) || o.items?.toLowerCase().includes(q);
    return matchFilter && matchSearch;
  });

  const chips = ['All','Pending','Paid','Processing','Delivered','Cancelled'].map(s => {
    const active = state.filter === s;
    const sc = STATUS_CONFIG[s];
    return `<button class="chip press" data-filter="${s}" style="border-color:${active?(sc?.dot||'#C9A84C'):'rgba(255,255,255,0.06)'};background:${active?(sc?sc.bg:'rgba(201,168,76,0.1)'):'transparent'};color:${active?(sc?.color||'#C9A84C'):'#444'}">${s==='All'?`All  ${state.orders.length}`:s}</button>`;
  }).join('');

  const orderCards = filtered.length === 0 ?
    `<div class="empty"><div class="empty-icon"><svg width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 12h6M9 16h4"/></svg></div><div class="empty-title">No orders here</div><div class="empty-sub">${state.orders.length===0?'Tap + New Order to get started':'Nothing matches this filter'}</div></div>` :
    filtered.map(o => renderOrderCard(o)).join('');

  return `
  <div class="page fade-in">
    <div style="font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:#383838;font-weight:600;margin-bottom:16px;">
      ${new Date().toLocaleDateString('en-NG',{weekday:'long',day:'numeric',month:'long'})}
    </div>
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-value" style="color:#C9A84C">₦${(todayRevenue/1000).toFixed(1)}k</div><div class="stat-label">Today</div><div class="stat-sub">${todayOrders.length} order${todayOrders.length!==1?'s':''}</div></div>
      <div class="stat-card"><div class="stat-value" style="color:#F5A623">${pendingCount}</div><div class="stat-label">Pending</div><div class="stat-sub">awaiting</div></div>
      <div class="stat-card"><div class="stat-value" style="color:#00E5A0">₦${(totalRevenue/1000).toFixed(0)}k</div><div class="stat-label">Earned</div><div class="stat-sub">delivered</div></div>
    </div>
    <div class="glow-sep"></div>
    <div class="search-wrap"><span class="search-icon">${icons.search}</span><input class="lux-input search-input" id="search-input" placeholder="Search by name, phone, items…" value="${state.searchQ}" /></div>
    <div class="filter-row">${chips}</div>
    ${orderCards}
  </div>`;
}

function renderOrderCard(o) {
  const sc = STATUS_CONFIG[o.status] || STATUS_CONFIG.Pending;
  const initials = (o.customer_name||'?')[0].toUpperCase();
  const statusChips = STATUSES.map(s => {
    const c = STATUS_CONFIG[s];
    const isActive = o.status === s;
    return `<button class="status-chip press" data-order-id="${o.id}" data-status="${s}" style="border-color:${isActive?c.dot:'rgba(255,255,255,0.06)'};background:${isActive?c.bg:'transparent'};color:${isActive?c.color:'#383838'}">${s}</button>`;
  }).join('');
  return `
  <div class="order-card press" data-view-order="${o.id}">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;">
      <div style="display:flex;align-items:center;gap:10px;">
        <div class="order-avatar">${initials}</div>
        <div><div class="order-name">${o.customer_name||'Unknown'}</div><div class="order-phone">${o.phone||''}</div></div>
      </div>
      <div style="text-align:right;">
        <div class="order-amount">${fmt(o.total)}</div>
        <span class="status-pill" style="background:${sc.bg};color:${sc.color};margin-top:4px;"><span style="width:5px;height:5px;border-radius:50%;background:${sc.dot};display:inline-block;flex-shrink:0;"></span>${o.status}</span>
      </div>
    </div>
    <div class="order-items">${o.items||''}</div>
    <div class="status-row" onclick="event.stopPropagation()">${statusChips}</div>
    <div class="order-date">${new Date(o.created_at).toLocaleDateString('en-NG',{day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'})}</div>
  </div>`;
}

function renderViewOrderModal() {
  const o = state.selected;

    return `<button class="status-update-btn press" data-update-status="${s}" style="border-color:${isActive?c.dot:'rgba(255,255,255,0.05)'};background:${isActive?c.bg:'#0e0e0e'};color:${isActive?c.color:'#383838'};">${s}</button>`;
  }).join('');
  const waBtns = state.templates.slice(0,4).map(t => {
    const msg = t.body.replace('{name}',o.customer_name||'').replace('{amount}',fmt(o.total));
    const phone = (o.phone||'').replace(/\D/g,'').replace(/^0/,'234');
    return `<a href="https://wa.me/${phone}?text=${encodeURIComponent(msg)}" target="_blank" style="text-decoration:none;display:block;margin-bottom:8px;"><button class="wa-btn press" style="justify-content:flex-start;gap:10px;">${icons.wa} ${t.title}</button></a>`;
  }).join('');
  return `
  <div class="sheet-overlay" id="modal-overlay"><div class="sheet-box sheet-up">
    <div class="sheet-handle"><div class="sheet-handle-bar"></div></div>
    <div class="sheet-header"><div class="sheet-title">Order Details</div><button class="close-btn press" id="close-modal">${icons.close}</button></div>
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid rgba(255,255,255,0.05);">
      <div class="order-avatar" style="width:50px;height:50px;border-radius:15px;font-size:20px;">${(o.customer_name||'?')[0].toUpperCase()}</div>
      <div style="flex:1;"><div style="font-weight:800;font-size:16px;color:#EDEDED;letter-spacing:-0.02em;">${o.customer_name||''}</div><div style="color:#383838;font-size:12px;margin-top:2px;font-family:'JetBrains Mono',monospace;">${o.phone||''}</div></div>
      <div style="text-align:right;"><div style="font-weight:800;font-size:22px;color:#C9A84C;letter-spacing:-0.04em;">${fmt(o.total)}</div><span class="status-pill" style="background:${sc.bg};color:${sc.color};margin-top:4px;display:inline-flex;"><span style="width:5px;height:5px;border-radius:50%;background:${sc.dot};"></span>${o.status}</span></div>
    </div>
    <div style="background:#0a0a0a;border-radius:14px;padding:14px 16px;margin-bottom:18px;">
      ${[['Items',o.items||'—'],['Address',o.address||'Not provided'],['Notes',o.notes||'—'],['Created',new Date(o.created_at).toLocaleString('en-NG')]].map(([l,v])=>`<div class="detail-row"><span class="detail-label">${l}</span><span class="detail-value">${v}</span></div>`).join('')}
    </div>
    <div class="section-label">Update Status</div>
    <div class="status-grid">${statusBtns}</div>
    <div class="section-label">Send Update</div>
    ${waBtns}
    <div style="display:flex;gap:10px;margin-top:4px;">
      <button class="ghost-btn press" id="copy-receipt" style="flex:1;">Copy Receipt</button>
      <button class="danger-btn press" id="delete-order" style="flex:1;">Delete</button>
    </div>
  </div></div>`;
}

function renderViewCustomerModal() {
  const c = state.selected;
  if(!c) return '';
  const cOrders = state.orders.filter(o=>o.phone===c.phone);
  const phone = (c.phone||'').replace(/\D/g,'').replace(/^0/,'234');
  const orderHistory = cOrders.length === 0 ?
    `<div style="color:#2e2e2e;font-size:14px;text-align:center;padding:16px 0;">No orders yet</div>` :
    cOrders.map(o => {
      const sc = STATUS_CONFIG[o.status];
      return `<div style="background:#0e0e0e;border:1px solid rgba(255,255,255,0.05);border-radius:12px;padding:12px 14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;"><div><div style="font-weight:600;font-size:13px;color:#ABABAB;">${(o.items||'').slice(0,30)}${(o.items||'').length>30?'…':''}</div><div style="color:#2e2e2e;font-size:11px;margin-top:3px;font-family:'JetBrains Mono',monospace;">${new Date(o.created_at).toLocaleDateString('en-NG')}</div></div><div style="text-align:right;"><div style="font-weight:700;color:#C9A84C;font-size:14px;">${fmt(o.total)}</div><span class="status-pill" style="background:${sc.bg};color:${sc.color};margin-top:4px;display:inline-flex;"><span style="width:4px;height:4px;border-radius:50%;background:${sc.dot};"></span>${o.status}</span></div></div>`;
    }).join('');
  return `
  <div class="sheet-overlay" id="modal-overlay"><div class="sheet-box sheet-up">
    <div class="sheet-handle"><div class="sheet-handle-bar"></div></div>
    <div class="sheet-header"><div class="sheet-title">Client Profile</div><button class="close-btn press" id="close-modal">${icons.close}</button></div>
    <div class="profile-avatar">${(c.name||'?')[0].toUpperCase()}</div>
    <div class="profile-name">${c.name||''}</div>
    <div class="profile-phone">${c.phone||''}</div>
    <div class="stats-2" style="margin-top:20px;">
      <div class="mini-stat"><div class="mini-stat-value" style="color:#00E5A0;">${cOrders.length}</div><div class="mini-stat-label">Orders</div></div>
      <div class="mini-stat"><div class="mini-stat-value" style="color:#C9A84C;font-size:20px;">${fmt(c.total_spent)}</div><div class="mini-stat-label">Total Spent</div></div>
    </div>
    <div class="section-label">Order History</div>
    ${orderHistory}
    <a href="https://wa.me/${phone}" target="_blank" style="text-decoration:none;display:block;margin-top:16px;">
      <button class="wa-btn press" style="font-size:15px;font-weight:700;">${icons.wa} Message on WhatsApp</button>
    </a>
  </div></div>`;
}

function renderTemplateModal() {
  const t = state.selected;
  return `
  <div class="sheet-overlay" id="modal-overlay"><div class="sheet-box sheet-up">
    <div class="sheet-handle"><div class="sheet-handle-bar"></div></div>
    <div class="sheet-header"><div class="sheet-title">${t?'Edit Template':'New Template'}</div><button class="close-btn press" id="close-modal">${icons.close}</button></div>
    <p style="color:#444;font-size:13px;margin-bottom:18px;line-height:1.7;">Use <code style="background:rgba(201,168,76,0.1);color:#C9A84C;padding:1px 7px;border-radius:5px;font-size:12px;">{name}</code> and <code style="background:rgba(201,168,76,0.1);color:#C9A84C;padding:1px 7px;border-radius:5px;font-size:12px;">{amount}</code> as placeholders.</p>
    <div style="margin-bottom:14px;"><label class="lux-label">Template Title</label><input class="lux-input" id="tmpl-title" placeholder="e.g. Order Confirmed" value="${t?.title||''}" /></div>
    <div style="margin-bottom:20px;"><label class="lux-label">Message Body</label><textarea class="lux-input" id="tmpl-body" rows="5" style="resize:vertical;line-height:1.65;" placeholder="Hi {name}! Your order has been confirmed. Total: {amount}.">${t?.body||''}</textarea></div>
    <button class="gold-btn press" id="save-template">Save Template</button>
  </div></div>`;
}

// ─── MAIN RENDER ──────────────────────────────────────
function render() {
  const app = document.getElementById('app');

  if(!state.user) {
    app.innerHTML = renderAuth();
    attachAuthEvents();
    return;
  }

  const pendingCount = state.orders.filter(o=>o.status==='Pending').length;
  const navItems = [
    { id:'orders', label:'Orders', badge: pendingCount },
    { id:'customers', label:'Clients' },
    { id:'templates', label:'Templates' },
    { id:'settings', label:'Settings' },
  ];

  const nav = `
  <nav class="bottom-nav">
    ${navItems.map(item => `
    <button class="nav-btn press" data-tab="${item.id}">
      ${icons[item.id](state.tab===item.id)}
      <span class="nav-label ${state.tab===item.id?'active':''}">${item.label}</span>
      ${state.tab===item.id?'<span class="nav-indicator"></span>':''}
      ${item.badge>0?`<span class="nav-badge">${item.badge}</span>`:''}
    </button>`).join('')}
  </nav>`;

  const newOrderBtn = state.tab==='orders' ? `<button class="press" id="new-order-btn" style="background:linear-gradient(135deg,#C9A84C,#E8C97A);border:none;border-radius:12px;padding:9px 16px;color:#0a0a0a;font-weight:800;font-size:13px;display:flex;align-items:center;gap:5px;letter-spacing:0.01em;">+ New Order</button>` : '';

  const header = `
  <header class="app-header">
    <div style="display:flex;align-items:center;gap:10px;">
      <div class="logo-box">${icons.box}</div>
      <div><div style="font-weight:800;font-size:17px;letter-spacing:-0.03em;color:#F0F0F0;">OrderFlow</div><div style="font-size:10px;color:#383838;letter-spacing:0.1em;text-transform:uppercase;font-weight:600;">Order Manager</div></div>
    </div>
    ${newOrderBtn}
  </header>`;

  let pageContent = '';
  if(state.tab==='orders') pageContent = renderOrders();
  else if(state.tab==='customers') pageContent = renderCustomers();
  else if(state.tab==='templates') pageContent = renderTemplates();
  else if(state.tab==='settings') pageContent = renderSettings();

  let modalContent = '';
  if(state.modal==='newOrder') modalContent = renderNewOrderModal();
  else if(state.modal==='viewOrder') modalContent = renderViewOrderModal();
  else if(state.modal==='viewCustomer') modalContent = renderViewCustomerModal();
  else if(state.modal==='newTemplate') modalContent = renderTemplateModal();

  app.innerHTML = header + pageContent + nav + modalContent;
  attachEvents();
}

// ─── EVENT HANDLERS ───────────────────────────────────
function attachAuthEvents() {
  document.getElementById('auth-submit')?.addEventListener('click', async () => {
    const email = document.getElementById('auth-email')?.value.trim();
    const password = document.getElementById('auth-password')?.value;
    const business = document.getElementById('auth-business')?.value.trim();
    if(!email || !password){ showToast('Enter your email and password','error'); return; }
    if(state.authMode==='signup') await signUp(email, password, business);
    else await signIn(email, password);
  });
  document.getElementById('auth-toggle')?.addEventListener('click', () => {
    state.authMode = state.authMode==='login'?'signup':'login';
    render();
  });
  // Allow enter key
  document.querySelectorAll('.lux-input').forEach(el => {
    el.addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('auth-submit')?.click(); });
  });
}

function attachEvents() {
  // Nav tabs
  document.querySelectorAll('[data-tab]').forEach(btn => {
    btn.addEventListener('click', () => {
      state.tab = btn.dataset.tab;
      state.searchQ = '';
      render();
    });
  });

  // New order
  document.getElementById('new-order-btn')?.addEventListener('click', () => {
    state.modal = 'newOrder';
    state.orderStep = 'method';
    state.orderForm = { customer_name:'',phone:'',items:'',total:'',address:'',notes:'' };
    render();
  });

  // New template
  document.getElementById('new-template-btn')?.addEventListener('click', () => {
    state.modal = 'newTemplate';
    state.selected = null;
    render();
  });

  // Close modal
  document.getElementById('close-modal')?.addEventListener('click', () => {
    state.modal = null; state.selected = null;
    render();
  });
  document.getElementById('modal-overlay')?.addEventListener('click', (e) => {
    if(e.target.id==='modal-overlay'){ state.modal=null; state.selected=null; render(); }
  });

  // Search
  document.getElementById('search-input')?.addEventListener('input', (e) => {
    state.searchQ = e.target.value;
    render();
  });

  // Filter chips
  document.querySelectorAll('[data-filter]').forEach(btn => {
    btn.addEventListener('click', () => { state.filter = btn.dataset.filter; render(); });
  });

  // View order
  document.querySelectorAll('[data-view-order]').forEach(card => {
    card.addEventListener('click', () => {
      const o = state.orders.find(o=>o.id===card.dataset.viewOrder);
      if(o){ state.selected=o; state.modal='viewOrder'; render(); }
    });
  });

  // Quick status update from card
  document.querySelectorAll('[data-order-id]').forEach(btn => {
    btn.addEventListener('click', async (e) => {
      e.stopPropagation();
      await updateStatus(btn.dataset.orderId, btn.dataset.status);
      if(state.selected?.id === btn.dataset.orderId) state.selected.status = btn.dataset.status;
    });
  });

  // Status update from modal
  document.querySelectorAll('[data-update-status]').forEach(btn => {
    btn.addEventListener('click', async () => {
      await updateStatus(state.selected.id, btn.dataset.updateStatus);
      state.selected.status = btn.dataset.updateStatus;
      render();
    });
  });

  // View customer
  document.querySelectorAll('[data-view-customer]').forEach(card => {
    card.addEventListener('click', () => {
      const c = state.customers.find(c=>c.id===card.dataset.viewCustomer);
      if(c){ state.selected=c; state.modal='viewCustomer'; render(); }
    });
  });

  // Edit template
  document.querySelectorAll('[data-edit-template]').forEach(btn => {
    btn.addEventListener('click', () => {
      const t = state.templates.find(t=>t.id===btn.dataset.editTemplate);
      if(t){ state.selected=t; state.modal='newTemplate'; render(); }
    });
  });

  // Delete template
  document.querySelectorAll('[data-delete-template]').forEach(btn => {
    btn.addEventListener('click', async () => {
      await deleteTemplate(btn.dataset.deleteTemplate);
    });
  });

  // Order modal steps
  document.getElementById('method-form')?.addEventListener('click', () => { state.orderStep='form'; render(); });
  document.getElementById('method-paste')?.addEventListener('click', () => { state.orderStep='paste'; render(); });
  document.getElementById('back-method')?.addEventListener('click', () => { state.orderStep='method'; render(); });

  // Chat text save
  document.getElementById('chat-text')?.addEventListener('input', (e) => { state.chatText=e.target.value; });

  // Parse chat
  document.getElementById('parse-btn')?.addEventListener('click', () => {
    if(!state.chatText.trim()) return;
    state.parsing = true;
    render();
    setTimeout(() => {
      const p = parseChat(state.chatText);
      state.orderForm = { customer_name:p.name||'',phone:p.phone||'',items:p.items||'',total:p.total||'',address:p.address||'',notes:'' };
      state.orderStep = 'form';
      state.parsing = false;
      render();
    }, 900);
  });

  // Order form fields
  document.querySelectorAll('.order-field').forEach(input => {
    input.addEventListener('input', (e) => { state.orderForm[e.target.dataset.field] = e.target.value; });
  });

  // Submit order
  document.getElementById('submit-order')?.addEventListener('click', async () => {
    const f = state.orderForm;
    if(!f.customer_name||!f.items){ showToast('Fill in customer name and items','error'); return; }
    await addOrder(f);
  });

  // Delete order
  document.getElementById('delete-order')?.addEventListener('click', async () => {
    if(state.selected) await deleteOrder(state.selected.id);
  });

  // Copy receipt
  document.getElementById('copy-receipt')?.addEventListener('click', () => {
    const o = state.selected;
    const r = `*ORDER RECEIPT*\n─────────────\nCustomer: ${o.customer_name}\nPhone: ${o.phone}\nItems: ${o.items}\nAmount: ${fmt(o.total)}\nDelivery: ${o.address||'N/A'}\nStatus: ${o.status}\nDate: ${new Date(o.created_at).toLocaleDateString('en-NG')}\n─────────────\nPowered by OrderFlow`;
    navigator.clipboard?.writeText(r);
    showToast('Receipt copied');
  });

  // Save template
  document.getElementById('save-template')?.addEventListener('click', async () => {
    const title = document.getElementById('tmpl-title')?.value.trim();
    const body = document.getElementById('tmpl-body')?.value.trim();
    if(!title||!body){ showToast('Fill in title and message','error'); return; }
    await saveTemplate({ title, body });
  });

  // Logout
  document.getElementById('logout-btn')?.addEventListener('click', async () => {
    await signOut();
  });
}

// ─── INIT ─────────────────────────────────────────────
async function init() {
  // Check existing session
  const { data: { session } } = await sb.auth.getSession();
  if(session?.user) {
    state.user = session.user;
    await loadData();
  }
  state.loading = false;
  render();

  // Listen for auth changes
  sb.auth.onAuthStateChange(async (event, session) => {
    if(session?.user) {
      state.user = session.user;
      await loadData();
    } else {
      state.user = null;
    }
    render();
  });
}

init();
</script>
</body>
</html>
